<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 音频引擎 - 体感DJ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="visual-engine.js"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 14px;
            letter-spacing: 5px;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase;
        }

        #start-btn:hover {
            background: #fff;
            color: #000;
            border: 1px solid #fff;
            letter-spacing: 8px;
        }

        #start-btn.started {
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: #fff;
            color: #000;
            opacity: 0.8;
        }

        #start-btn.started::before {
            content: "[ ";
        }

        #start-btn.started::after {
            content: " ]";
        }

        #status {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.8;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        #info {
            margin-top: 20px;
            text-align: center;
            line-height: 1.8;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-right: 10px;
            transition: all 0.3s;
        }

        .dot.active {
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* =========================================
           高级抽屉控制面板设计 (Settings Drawer)
           ========================================= */
        #menu-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 3000;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
        }

        #menu-btn span {
            display: block;
            width: 25px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
        }

        #menu-btn:hover span {
            background-color: #fff;
        }

        #menu-btn.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
            background-color: #fff;
        }

        #menu-btn.open span:nth-child(2) {
            opacity: 0;
        }

        #menu-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
            background-color: #fff;
        }

        #settings-drawer {
            position: absolute;
            top: 0;
            right: -300px;
            width: 260px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 2500;
            transition: right 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 70px 20px 20px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #aaa;
            font-size: 11px;
            letter-spacing: 1px;
            overflow-y: auto;
        }

        #settings-drawer.open {
            right: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-group label {
            text-transform: uppercase;
            color: #fff;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #fff;
            cursor: pointer;
        }

        .control-group select,
        .control-group input[type="color"] {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 5px;
            font-family: inherit;
            cursor: pointer;
        }

        .control-group select option {
            background: #111;
        }

        /* 个性化 Toggle 开关 */
        .toggle-btn {
            padding: 8px 0;
            text-align: center;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .toggle-btn.active {
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body>

    <!-- 菜单按钮 (汉堡图标) -->
    <button id="menu-btn">
        <span></span><span></span><span></span>
    </button>

    <!-- 侧边设置抽屉 -->
    <div id="settings-drawer">
        <!-- 核心总控 -->
        <div class="control-group">
            <button id="visual-toggle" class="toggle-btn">ENABLE VISUAL</button>
            <button id="crt-toggle" class="toggle-btn active" style="margin-top: 5px;">CRT SCANLINES: ON</button>
        </div>

        <!-- 视觉方案选择 -->
        <div class="control-group">
            <label for="visual-preset">Visual Pattern</label>
            <select id="visual-preset">
                <option value="0">Topological Wireframe</option>
                <option value="1">Retro Flight Sim</option>
                <option value="2" selected>Joy Division Waves</option>
            </select>
        </div>

        <!-- 视觉表现推子 -->
        <div class="control-group" data-vis="0,1,2">
            <label>Motion Speed (视觉响应速度/柔和度)</label>
            <input type="range" id="damping-slider" min="0.001" max="1.0" step="0.001" value="0.6">
        </div>

        <div class="control-group" data-vis="1">
            <label>Flight Speed (飞行/前进基速)</label>
            <input type="range" id="flight-speed-slider" min="0" max="20" step="1" value="10">
        </div>

        <div class="control-group" data-vis="1">
            <label>Steer Sensitivity (飞行摇晃灵敏度)</label>
            <input type="range" id="steering-sens-slider" min="0.0" max="1.0" step="0.1" value="0.2">
        </div>

        <div class="control-group" data-vis="2">
            <label>Wave Height (波峰绝对高度)</label>
            <input type="range" id="wave-amp-slider" min="0.1" max="2.0" step="0.1" value="0.2">
        </div>

        <div class="control-group" data-vis="2">
            <label>Zoom (画面远近缩放)</label>
            <input type="range" id="zoom-slider" min="0.3" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="control-group" data-vis="0,1,2">
            <label>Line Thickness (拉丝粗细)</label>
            <input type="range" id="thickness-slider" min="0.1" max="2.0" step="0.1" value="0.5">
        </div>

        <div class="control-group" data-vis="0,1,2">
            <label>Trail Persistence (残影停留)</label>
            <input type="range" id="blur-slider" min="0.01" max="0.5" step="0.01" value="0.15">
        </div>

        <div class="control-group" data-vis="0,1,2">
            <label>Line Color (主色调)</label>
            <input type="color" id="color-picker" value="#ffffff">
        </div>
    </div>

    <!-- 渲染载体 -->
    <canvas id="visual-canvas"></canvas>
    <div id="crt-overlay"></div>

    <button id="start-btn">INITIALIZE SYSTEM</button>
    <div id="status">
        <span class="dot" id="ws-dot"></span> <span id="ws-status" style="opacity: 0.6;">SYS.OFFLINE</span>
    </div>
    <div id="info">
        <div>速度: <span id="velocity">0</span> cm/s</div>
        <div>能量: <span id="energy">0</span>%</div>
        <div>音色: <span id="preset">1</span></div>
    </div>

    <script>
        // === UI 交互逻辑提取 ===
        const menuBtn = document.getElementById('menu-btn');
        const settingsDrawer = document.getElementById('settings-drawer');
        const visualToggle = document.getElementById('visual-toggle');
        const crtToggle = document.getElementById('crt-toggle');
        const visualCanvas = document.getElementById('visual-canvas');
        const crtOverlay = document.getElementById('crt-overlay');

        // 绑定获取参数
        const presetSelect = document.getElementById('visual-preset');
        const dampingSlider = document.getElementById('damping-slider');
        const flightSpeedSlider = document.getElementById('flight-speed-slider');
        const steeringSensSlider = document.getElementById('steering-sens-slider');
        const waveAmpSlider = document.getElementById('wave-amp-slider');
        const zoomSlider = document.getElementById('zoom-slider');
        const thicknessSlider = document.getElementById('thickness-slider');
        const blurSlider = document.getElementById('blur-slider');
        const colorPicker = document.getElementById('color-picker');

        // 更新控制面板控件的显示逻辑
        function updateSliderVisibility() {
            const currentPreset = presetSelect.value;
            document.querySelectorAll('.control-group[data-vis]').forEach(el => {
                if (el.getAttribute('data-vis').includes(currentPreset)) {
                    el.style.display = 'block';
                } else {
                    el.style.display = 'none';
                }
            });
        }
        updateSliderVisibility();

        let isVisualActive = false;
        let isCRTActive = true;

        // 当前选择的视觉 Preset（解绑声音设定，前端独立控制）
        let activeVisualPreset = parseInt(presetSelect.value);

        menuBtn.onclick = () => {
            menuBtn.classList.toggle('open');
            settingsDrawer.classList.toggle('open');
        };

        crtToggle.onclick = () => {
            isCRTActive = !isCRTActive;
            if (isCRTActive) {
                crtOverlay.style.display = isVisualActive ? 'block' : 'none';
                crtToggle.innerText = 'CRT SCANLINES: ON';
                crtToggle.classList.add('active');
            } else {
                crtOverlay.style.display = 'none';
                crtToggle.innerText = 'CRT SCANLINES: OFF';
                crtToggle.classList.remove('active');
            }
        };

        visualToggle.onclick = () => {
            isVisualActive = !isVisualActive;
            if (isVisualActive) {
                visualCanvas.style.display = 'block';
                if (isCRTActive) crtOverlay.style.display = 'block';
                visualToggle.innerText = 'DISABLE VISUAL';
                visualToggle.classList.add('active');

                if (window.initVisualEngine) window.initVisualEngine();
                // 把界面信息做极淡化处理
                document.getElementById('info').style.opacity = '0.05';
            } else {
                visualCanvas.style.display = 'none';
                crtOverlay.style.display = 'none';
                visualToggle.innerText = 'ENABLE VISUAL';
                visualToggle.classList.remove('active');
                document.getElementById('info').style.opacity = '1';
            }
        };

        // 监听前端视觉面板的所有变化并传给 Engine
        const dispatchSettings = () => {
            if (window.visualEngine) {
                window.visualEngine.updateSettings({
                    visPreset: parseInt(presetSelect.value),
                    damping: parseFloat(dampingSlider.value),
                    flightSpeed: parseFloat(flightSpeedSlider.value),
                    steeringSens: parseFloat(steeringSensSlider.value),
                    waveAmp: parseFloat(waveAmpSlider.value),
                    zoom: parseFloat(zoomSlider.value),
                    thickness: parseFloat(thicknessSlider.value),
                    blurBase: parseFloat(blurSlider.value),
                    color: colorPicker.value
                });
            }
        };

        presetSelect.addEventListener('change', (e) => {
            updateSliderVisibility();
            dispatchSettings();
        });
        dampingSlider.addEventListener('input', dispatchSettings);
        flightSpeedSlider.addEventListener('input', dispatchSettings);
        steeringSensSlider.addEventListener('input', dispatchSettings);
        waveAmpSlider.addEventListener('input', dispatchSettings);
        zoomSlider.addEventListener('input', dispatchSettings);
        thicknessSlider.addEventListener('input', dispatchSettings);
        blurSlider.addEventListener('input', dispatchSettings);
        colorPicker.addEventListener('input', dispatchSettings);

        const startBtn = document.getElementById('start-btn');
        const wsStatus = document.getElementById('ws-status');
        const wsDot = document.getElementById('ws-dot');
        const velocityDisplay = document.getElementById('velocity');
        const energyDisplay = document.getElementById('energy');
        const presetDisplay = document.getElementById('preset');

        let ws = null;
        let isStarted = false;
        let currentFingers = 0;

        // --- 全局变量 ---
        let leadSynth, kickSynth, droneSynth, organSynth, noiseSynth;
        let masterLimiter, mainReverb, heliTremolo; // 增加 Tremolo
        let leadGain, kickGain, droneGain, organGain, noiseGain;
        let droneFilter, noiseFilter;

        // === FX 层乐器 (效果手 / iPad 第二只手) ===
        let fxKickSynth, fxMetalSynth, fxNoiseSynth, fxLeadSynth, fxFluteSynth, fxSquareSynth;
        let fxKickGain, fxMetalGain, fxNoiseGain, fxLeadGain, fxFluteGain, fxSquareGain;
        let fxNoiseFilter;
        let fxLastTriggerTime = 0;
        let fxCurrentMode = 'drum';
        let fxOverallVol = 1.0;   // FX 层全局音量倍率
        let fxOverallPitch = 0;   // FX 层全局音高偏移 (半音)

        // 状态变量
        let energyBuffer = [];
        let currentIntensity = 0;
        let currentEnergy = 0;
        let currentVelocity = 0;
        let lastTriggerTime = 0;
        let sirenLFO = null;

        // 乐理系统
        const keyRoot = "D3";
        const chordProgression = [
            ["D3", "F3", "A3"], ["Bb2", "D3", "F3"], ["F3", "A3", "C4"], ["C3", "E3", "G3"]
        ];
        let currentChordIndex = 0;
        const cyberScale = ["D3", "F3", "G3", "G#3", "A3", "C4", "D4", "F4"];

        // 预设定义
        const stylePresets = [
            { name: "CLASSICAL", desc: "Symphony | 自动和声 | 宏大" },
            { name: "CYBER PUNK", desc: "Techno | 强力底鼓 | 侧链" },
            { name: "WARZONE", desc: "Cinematic | 螺旋桨 | 警报" }
        ];

        // --- 初始化音频系统的核心 ---
        async function initAudio() {
            try {
                // 1. 混音总线设计
                masterLimiter = new Tone.Limiter(-1).toDestination();

                // Reverb: 默认全干 (Wet=0)，Lv4 才开启，模拟"空间感"作为一种特效
                mainReverb = new Tone.Reverb({ decay: 5, wet: 0 }).connect(masterLimiter);

                // 直升机专用效果器 (放在总线前)
                heliTremolo = new Tone.Tremolo(9, 1).start().connect(masterLimiter);
                heliTremolo.wet.value = 0; // 默认关闭

                // 2. 乐器初始化

                // [Kick / Impact]: 直通 Master (不进 Reverb 保持有力)
                // Cyberpunk 需要更猛的底鼓
                kickGain = new Tone.Gain(1.0).connect(masterLimiter);
                kickSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.1, octaves: 8, oscillator: { type: "sine" },
                    envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 }
                }).connect(kickGain);

                // [Lead / Piano]: 进 Reverb (可变湿)
                leadGain = new Tone.Gain(0.8).connect(mainReverb);
                leadSynth = new Tone.PolySynth(Tone.Synth, {
                    maxPolyphony: 6,
                    options: { oscillator: { type: "triangle" }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 } }
                }).connect(leadGain);

                // [Drone / Strings / Bass]: 进 Reverb
                // 移除 Sidechain 以保证"最基础的低音始终占主导"
                droneGain = new Tone.Gain(0.8).connect(mainReverb);
                droneSynth = new Tone.FatOscillator({ type: "sawtooth", spread: 40, count: 3 }).start();
                droneFilter = new Tone.AutoFilter(0.1, 200).connect(droneGain).start();
                droneSynth.connect(droneFilter);

                // [Organ / Brass / Siren]: 进 Reverb
                organGain = new Tone.Gain(0.6).connect(mainReverb);
                organSynth = new Tone.PolySynth(Tone.Synth, {
                    options: { oscillator: { type: "sawtooth" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.5, release: 0.5 } }
                }).connect(organGain);

                // [Noise / Helicopter]: 直通 Master
                noiseGain = new Tone.Gain(0).connect(masterLimiter);
                noiseSynth = new Tone.Noise("pink").start();
                noiseFilter = new Tone.Filter(800, "lowpass").connect(noiseGain);
                noiseSynth.connect(noiseFilter);

                // 专用 LFO
                sirenLFO = new Tone.LFO(0.5, 400, 600).start(); // 0.5Hz 的警报起伏

                // 3. Transport
                Tone.Transport.bpm.value = 120;
                Tone.Transport.scheduleRepeat(globalTick, "16n");

                await Tone.start();
                Tone.Transport.start();

                // ====== 初始化 FX 层乐器 ======
                // Kick (重踏 / 地鼓) — 用于单次用力重击
                fxKickGain = new Tone.Gain(0.9).connect(masterLimiter);
                fxKickSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.08, octaves: 10,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.8 }
                }).connect(fxKickGain);

                // Metal (锥 / Hi-Hat / Crash) — 用于快速连击
                fxMetalGain = new Tone.Gain(0.5).connect(masterLimiter);
                fxMetalSynth = new Tone.MetalSynth({
                    frequency: 200, envelope: { attack: 0.001, decay: 0.1, release: 0.05 },
                    harmonicity: 5.1, modulationIndex: 32, resonance: 2000, octaves: 1.5
                }).connect(fxMetalGain);

                // Noise (白器声 / 风声) — 用于 SFX 模式
                fxNoiseGain = new Tone.Gain(0).connect(masterLimiter);
                fxNoiseSynth = new Tone.Noise('white').start();
                fxNoiseFilter = new Tone.Filter(200, 'lowpass').connect(fxNoiseGain);
                fxNoiseSynth.connect(fxNoiseFilter);

                // Lead / Keys (琴键琑音) — 用于 KEYS 模式 (三角波，明亮清快)
                fxLeadGain = new Tone.Gain(0.6).connect(mainReverb);
                fxLeadSynth = new Tone.PolySynth(Tone.Synth, {
                    maxPolyphony: 8, // 调大聚音数，防止声音被掐断
                    options: {
                        oscillator: { type: 'triangle' },
                        envelope: { attack: 0.01, decay: 0.15, sustain: 0.1, release: 0.4 }
                    }
                }).connect(fxLeadGain);

                // Flute (笛子 / 口哨) — 用于 FLUTE 模式 (正弦波 + Portamento 滑音)
                fxFluteGain = new Tone.Gain(0.5).connect(mainReverb);
                fxFluteSynth = new Tone.Synth({
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.08, decay: 0.3, sustain: 0.6, release: 0.5 },
                    portamento: 0.15 // 丝滑的音高过渡
                }).connect(fxFluteGain);
                fxFluteSynth.triggerAttack('C4'); // 保持持续音，通过音量控制开关
                fxFluteGain.gain.value = 0; // 默认静音

                // Square (8-bit 合成器) — 用于 RETRO 模式
                fxSquareGain = new Tone.Gain(0.3).connect(masterLimiter);
                fxSquareSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.001, decay: 0.1, sustain: 0.02, release: 0.15 }
                }).connect(fxSquareGain);

                console.log('✅ 音频引擎 v5.0 (Dual Controller + FX Layer)');

                applyPreset(0);
                updateIntensity(0);
            } catch (e) { console.error("Audio Init Error:", e); }
        }

        // --- 全局节拍事件 ---
        function globalTick(time) {
            const position = Tone.Transport.position.split(':');
            const beat = parseInt(position[1]);
            const sixteenth = parseFloat(position[2]).toFixed(1);
            const isDownbeat = (sixteenth === "0.0");

            // 和弦切换
            const measure = parseInt(position[0]);
            currentChordIndex = Math.floor(measure / 2) % chordProgression.length;
            const chord = chordProgression[currentChordIndex];

            // === 1. CLASSICAL ===
            if (currentFingers === 0) {
                // Piano (Base): 始终稳固
                // 只有 Level 0+ 且有能量时弹，作为基底
                if (currentEnergy > 5 && (isDownbeat || currentEnergy > 50)) {
                    leadSynth.triggerAttackRelease(
                        chord[Math.floor(Math.random() * chord.length)],
                        "16n", time
                    );
                }

                // Strings (Lv2+): 干音叠加
                if (currentIntensity >= 1 && beat === 0 && isDownbeat) {
                    droneSynth.frequency.rampTo(chord[0], 0.1);
                }

                // Brass (Lv3+): 干音点缀
                if (currentIntensity >= 2 && beat === 0 && isDownbeat) {
                    if (currentVelocity > 40) { // 稍微用力才出来
                        organSynth.triggerAttackRelease([chord[0], chord[4] || chord[1]], "4n", time, 0.8);
                    }
                }

                // Tutti (Lv4): 混响开启 (见 updateIntensity)
            }

            // === 2. CYBERPUNK ===
            else if (currentFingers === 1) {
                // Kick (Base): 显著加强
                if (currentEnergy > 5) {
                    if (isDownbeat) {
                        kickSynth.triggerAttackRelease("C1", "8n", time, 1.2); // Velocity 1.2 增强力度
                    } else if (currentEnergy > 80 && Math.random() > 0.6) {
                        kickSynth.triggerAttackRelease("C1", "16n", time, 1.0);
                    }
                }

                // Guitar (Lv2+): 干音，清晰
                if (currentIntensity >= 1 && currentEnergy > 20 && Math.random() > 0.6) {
                    const note = cyberScale[Math.floor(Math.random() * cyberScale.length)];
                    leadSynth.triggerAttackRelease(note, "16n", time, 0.7); // 音量稍收，不抢 Kick
                }

                // Bass (Lv3+): 补充低频
                if (currentIntensity >= 2 && !isDownbeat && sixteenth === "2.0") {
                    droneSynth.frequency.value = "D2";
                }
            }

            // === 3. WARZONE ===
            else if (currentFingers === 2) {
                // Drone (Lv1): 始终由 Base 负责，在 playPerformanceNote 里做动态

                // Siren (Lv3): 警报
                if (currentIntensity >= 2) {
                    // 双音效果由 organSynth 模拟
                    if (isDownbeat && beat % 4 === 0) { // 长警报
                        // 两个音稍微走调，制造紧张感
                        organSynth.triggerAttackRelease(["A4", "A#4"], "1m", time, 0.4);
                    }
                }
            }
        }

        // 应用音色预设
        function applyPreset(presetId) {
            if (!leadSynth) return;
            if (presetId < 0 || presetId >= stylePresets.length) return;

            leadSynth.releaseAll();
            organSynth.releaseAll();
            sirenLFO.stop();

            // 路由还原
            noiseGain.disconnect();
            noiseGain.connect(masterLimiter); // 默认直通
            heliTremolo.wet.value = 0; // 关闭 Tremolo

            if (presetId === 2) {
                sirenLFO.start();
                // Warzone 特殊路由: Noise 通过 Tremolo
                noiseGain.disconnect();
                noiseGain.connect(heliTremolo);
                heliTremolo.wet.value = 1;
            }

            currentFingers = presetId;
            presetDisplay.innerText = stylePresets[presetId].name;

            switch (presetId) {
                case 0: configClassical(); break;
                case 1: configCyberpunk(); break;
                case 2: configWarzone(); break;
            }
            updateIntensity(0);
        }

        // 手势触发事件 (动态控制)
        function playPerformanceNote(velocity, energy) {
            if (Tone.context.state !== 'running') Tone.context.resume();
            currentVelocity = velocity;
            currentEnergy = energy;

            // WARZONE Drone 动态: 近大远小
            if (currentFingers === 2) {
                // 只有 Drone 开启时 (Lv1+)
                // 速度越快(近)，Filter 越开，且音量越大
                const dynamicVol = Tone.gainToDb(0.4 + (velocity / 200) * 0.4); // 0.4 ~ 0.8
                droneGain.gain.rampTo(Tone.dbToGain(dynamicVol), 0.1);

                // 额外的风阻感: 速度越快，频率稍微 Detune
                droneSynth.detune.rampTo(velocity > 50 ? (velocity - 50) : 0, 0.1);
            }

            // WARZONE Explosion (Lv4)
            if (currentFingers === 2 && currentIntensity >= 3) {
                if (velocity > 120 && Tone.now() - lastTriggerTime > 1) {
                    // 炸弹穿插其中，不压低 Drone
                    kickSynth.triggerAttackRelease("G0", "1n", "+0", 1.5); // 极重低音
                    noiseSynth.type = "brown";
                    noiseGain.gain.cancelScheduledValues(Tone.now());
                    noiseGain.gain.setValueAtTime(1, Tone.now());
                    noiseGain.gain.exponentialRampTo(0, 3, Tone.now() + 3); // 长尾音
                    lastTriggerTime = Tone.now();
                }
            }
        }

        function updateIntensity(level) {
            currentIntensity = level;
            const t = 0.5;
            const now = Tone.now();

            // 核心混音逻辑: Lv4 才开 Global Reverb
            mainReverb.wet.rampTo(level >= 3 ? 0.4 : 0, 2); // 慢慢进入混响

            if (currentFingers === 0) { // CLASSICAL
                // Lv1: Piano (Base)
                leadGain.gain.rampTo(1, t);
                // Lv2: Violin (Dry)
                droneGain.gain.rampTo(level >= 1 ? 0.4 : 0, t);
                // Lv3: Brass (Dry)
                organGain.gain.rampTo(level >= 2 ? 0.5 : 0, t);
            }
            else if (currentFingers === 1) { // CYBER PUNK
                // Lv1: Kick (Base)
                kickGain.gain.rampTo(1.2, t);
                // Lv2: Guitar (Dry)
                leadGain.gain.rampTo(level >= 1 ? 0.7 : 0, t);
                // Lv3: Bass (Dry)
                droneGain.gain.rampTo(level >= 2 ? 0.6 : 0, t);
                // Lv4: Noise
                noiseGain.gain.rampTo(level >= 3 ? 0.2 : 0, t);
            }
            else if (currentFingers === 2) { // WARZONE
                // Lv1: Drone (Base) - 始终坚挺
                droneGain.gain.rampTo(0.6, t);
                // Lv2: Helicopter (扇叶感)
                noiseGain.gain.rampTo(level >= 1 ? 0.5 : 0, t);
                // Lv3: Siren (Warning)
                organGain.gain.rampTo(level >= 2 ? 0.4 : 0, t);
                // Lv4: Explosion (Triggered)
            }
        }

        // --- 音色配置 ---
        function configClassical() {
            leadSynth.set({ oscillator: { type: "triangle" } }); // Piano
            droneSynth.type = "sawtooth"; // Strings
            droneSynth.frequency.value = chordProgression[0][0];
            if (droneFilter) droneFilter.type = "lowpass";
            if (droneFilter) droneFilter.frequency.value = 1500; // 稍微亮一点
            organSynth.set({ oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.5 } });
        }

        function configCyberpunk() {
            leadSynth.set({ oscillator: { type: "sawtooth" } }); // 更亮的 Guitar
            droneSynth.type = "square"; // Bass
            if (droneFilter) droneFilter.type = "lowpass";
            if (droneFilter) droneFilter.frequency.value = 400; // 闷一点的 Bass
        }

        function configWarzone() {
            // Drone: 深沉
            droneSynth.type = "sine";
            droneSynth.frequency.value = "D1";

            // Helicopter: Noise + LFO
            noiseSynth.type = "brown";
            if (droneFilter) droneFilter.type = "highpass"; // 对 Noise 无效，但这不重要

            // Siren: 双音
            organSynth.set({ oscillator: { type: "fatcustom", count: 2, spread: 20 }, portamento: 0.1 });
        }

        // 计算平均能量
        function getAvgEnergy() {
            if (!energyBuffer.length) return 0;
            const sum = energyBuffer.reduce((a, b) => a + b, 0);
            const avg = (sum / energyBuffer.length) / 100;
            return isFinite(avg) ? avg : 0;
        }

        // 连接 WebSocket
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8080'); // 确保这里的 IP 和 App.js 一致（或使用 localhost）

            ws.onopen = () => {
                console.log('✅ WebSocket 已连接');
                wsStatus.innerText = 'LINK ESTABLISHED';
                wsStatus.style.opacity = '1';
                wsDot.classList.add('active');
                ws.send(JSON.stringify({ type: 'register', client: 'browser' }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'motion' && isStarted) {
                        velocityDisplay.innerText = Math.round(data.velocity);
                        energyDisplay.innerText = Math.round(data.energy);
                        
                        // 实时同步预设 (防止浏览器中途加入导致不一致)
                        if (data.preset !== undefined && data.preset !== currentFingers) {
                            applyPreset(data.preset);
                        }

                        // 实时更新层级
                        if (data.intensity !== undefined && data.intensity !== currentIntensity) {
                            updateIntensity(data.intensity);
                        }

                        playPerformanceNote(data.velocity, data.energy);

                        // 喂数据给视觉引擎！(传入陀螺仪角度实现真正的 3D 飞行控制)
                        if (isVisualActive && window.visualEngine) {
                            window.visualEngine.updateData(data.velocity, data.energy, data.rotation);
                        }
                    }
                    else if (data.type === 'preset') {
                        applyPreset(data.value);
                    }
                    else if (data.type === 'intensity') {
                        updateIntensity(data.value);
                    }

                    // ===== 效果手 FX 数据处理 =====
                    else if (data.type === 'fx_motion' && isStarted) {
                        if (data.fxVol !== undefined) fxOverallVol = data.fxVol;
                        if (data.fxPitch !== undefined) fxOverallPitch = data.fxPitch;
                        handleFxTrigger(data);
                    }
                    else if (data.type === 'fx_mode') {
                        fxCurrentMode = data.mode;
                        console.log('🏛️ FX 模式切换:', data.mode);
                        // 切换模式时释放某些持续音
                        if (data.mode !== 'flute' && fxFluteGain) fxFluteGain.gain.rampTo(0, 0.3);
                        if (data.mode !== 'sfx' && fxNoiseGain) fxNoiseGain.gain.rampTo(0, 0.3);
                    }
                } catch (e) { console.error('消息解析失败:', e); }
            };
            ws.onerror = (error) => {
                console.error('❌ WebSocket 错误:', error);
                wsStatus.innerText = 'CONNECTION FAILED';
                wsStatus.style.opacity = '0.6';
                wsDot.classList.remove('active');
            };

            ws.onclose = () => {
                console.log('⚠️ WebSocket 已断开');
                wsStatus.innerText = 'SYS.OFFLINE';
                wsStatus.style.opacity = '0.6';
                wsDot.classList.remove('active');
            };
        }

        // ===== FX 层即时触发引擎 (零延迟响应，额外添加在主旋律之上) =====
        let fxCoolDownMap = { drum: 0, keys: 0, retro: 0 }; // 触发冷却管理

        function handleFxTrigger(data) {
            if (!fxKickSynth) return; // 保护：未初始化时跳过
            const vel = data.velocity || 0;
            const energy = data.energy || 0;
            const mode = data.fxMode || fxCurrentMode;
            const accY = data.accY || 0;
            const now = Tone.now();
            const schedTime = "+0.05"; // 关键：提前 0.05s 预排程，消除 Glitch

            // 对数力度曲线 (0.0 ~ 1.0+) * FX音量倍率 (0~4x)
            const perceivedForce = (Math.log2(1 + vel / 50) / Math.log2(3)) * fxOverallVol;
            
            // 阈值过滤
            if (vel < 30 && mode !== 'flute' && mode !== 'sfx') return;

            // 节流机制：对于打击类音色，50ms 内只允许触发一次
            if (['drum', 'keys', 'retro'].includes(mode)) {
                if (performance.now() - fxCoolDownMap[mode] < 50) return;
                fxCoolDownMap[mode] = performance.now();
            }

            // 获取带偏移的音阶/音符函数
            const getPitch = (baseNote) => {
                return Tone.Frequency(baseNote).transpose(fxOverallPitch).toNote();
            };

            // ===== DRUM 模式 =====
            if (mode === 'drum') {
                const timeSinceLast = now - fxLastTriggerTime;
                fxLastTriggerTime = now;

                if (timeSinceLast < 0.12 && vel > 80) {
                    // 连击极快 + 大力量 → Crash 锥片
                    fxMetalSynth.set({ envelope: { decay: 0.8, release: 0.5 } });
                    fxMetalSynth.triggerAttackRelease('16n', schedTime, Math.min(1, perceivedForce));
                } else if (timeSinceLast < 0.2) {
                    // 快速连击 → Hi-Hat
                    fxMetalSynth.set({ envelope: { decay: 0.05, release: 0.02 } });
                    fxMetalSynth.triggerAttackRelease('32n', schedTime, Math.min(0.8, perceivedForce * 0.7));
                } else if (vel > 120) {
                    // 重重一击 → 深沉地鼓 (Kick) - 稍微调高一点 Kick 的基本频率以响应 Pitch 偏移
                    const kickNote = Tone.Frequency("C1").transpose(fxOverallPitch).toNote();
                    fxKickSynth.triggerAttackRelease(kickNote, '8n', schedTime, Math.min(1.5, perceivedForce * 1.2));
                } else {
                    // 普通中等力度 → 军鼓/Snare
                    fxMetalSynth.set({ envelope: { decay: 0.15, release: 0.1 } });
                    fxMetalSynth.triggerAttackRelease('16n', schedTime, Math.min(1, perceivedForce * 0.9));
                    fxKickSynth.triggerAttackRelease('E1', '16n', schedTime, Math.min(0.5, perceivedForce * 0.3));
                }
            }

            // ===== KEYS 模式 (调性笼琑音) =====
            else if (mode === 'keys') {
                const safeNotes = ['D3', 'F3', 'G3', 'A3', 'C4', 'D4', 'F4', 'G4', 'A4', 'C5', 'D5', 'F5'];
                const noteCount = vel > 100 ? 3 : (vel > 60 ? 2 : 1);
                const picked = [];
                for (let i = 0; i < noteCount; i++) {
                    const note = getPitch(safeNotes[Math.floor(Math.random() * safeNotes.length)]);
                    picked.push(note);
                }
                fxLeadSynth.triggerAttackRelease(picked, '16n', schedTime, Math.min(0.8, perceivedForce * 0.6));
            }

            // ===== FLUTE 模式 (体感音高笛子) =====
            else if (mode === 'flute') {
                const midiBase = 48 + fxOverallPitch, midiRange = 36;
                const normalizedY = (accY + 10) / 20;
                const midiNote = Math.round(midiBase + normalizedY * midiRange);
                const freq = Tone.Frequency(midiNote, 'midi').toFrequency();
                fxFluteSynth.frequency.rampTo(freq, 0.1);
                const targetVol = Math.min(0.6, perceivedForce * 0.5);
                fxFluteGain.gain.rampTo(targetVol, 0.1);
            }

            // ===== SFX 模式 (白噪风声) =====
            else if (mode === 'sfx') {
                const filterFreq = 100 + (vel / 150) * 4000;
                fxNoiseFilter.frequency.rampTo(filterFreq, 0.1);
                fxNoiseGain.gain.rampTo(Math.min(0.5, perceivedForce * 0.4), 0.1);
            }

            // ===== RETRO 模式 (8-bit 芯片音) =====
            else if (mode === 'retro') {
                const retroScale = ['C4', 'D4', 'E4', 'G4', 'A4', 'C5', 'D5', 'E5'];
                const note = getPitch(retroScale[Math.floor(Math.random() * retroScale.length)]);
                fxSquareSynth.triggerAttackRelease(note, '32n', schedTime, Math.min(0.8, perceivedForce * 0.6));
            }
        }


        // 启动按钮
        startBtn.onclick = async () => {
            try {
                await Tone.start();
                initAudio();
                Tone.Transport.start();
                isStarted = true;
                startBtn.innerText = 'SYSTEM ACTIVE';
                startBtn.classList.add('started');
                startBtn.disabled = true;

                // 连接 WebSocket
                connectWebSocket();
            } catch (e) {
                console.error(e);
                startBtn.innerText = "重试...";
            }
        };

        console.log('📌 使用说明:');
        console.log('1. 点击"启动音频系统"按钮');
        console.log('2. 在手机 Expo App 中连接到服务器');
        console.log('3. 挥动手机，享受音乐！');
    </script>
