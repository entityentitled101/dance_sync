<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 音频引擎 - 体感DJ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 18px;
            letter-spacing: 4px;
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            transition: all 0.4s;
        }

        #start-btn:hover {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
        }

        #status {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        #info {
            margin-top: 20px;
            text-align: center;
            line-height: 1.8;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f00;
            margin-right: 8px;
        }

        .dot.active {
            background: #0f0;
        }
    </style>
</head>

<body>

    <button id="start-btn">启动音频系统</button>
    <div id="status">
        <span class="dot" id="ws-dot"></span> WebSocket: <span id="ws-status">未连接</span>
    </div>
    <div id="info">
        <div>速度: <span id="velocity">0</span> cm/s</div>
        <div>能量: <span id="energy">0</span>%</div>
        <div>音色: <span id="preset">1</span></div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const wsStatus = document.getElementById('ws-status');
        const wsDot = document.getElementById('ws-dot');
        const velocityDisplay = document.getElementById('velocity');
        const energyDisplay = document.getElementById('energy');
        const presetDisplay = document.getElementById('preset');

        let ws = null;
        let isStarted = false;
        let currentFingers = 0;

        // --- 全局变量 ---
        let leadSynth, kickSynth, droneSynth, organSynth, noiseSynth;
        let masterLimiter, mainReverb, heliTremolo; // 增加 Tremolo
        let leadGain, kickGain, droneGain, organGain, noiseGain;
        let droneFilter, noiseFilter;

        // 状态变量
        let energyBuffer = [];
        let currentIntensity = 0;
        let currentEnergy = 0;
        let currentVelocity = 0;
        let lastTriggerTime = 0;
        let sirenLFO = null;

        // 乐理系统
        const keyRoot = "D3";
        const chordProgression = [
            ["D3", "F3", "A3"], ["Bb2", "D3", "F3"], ["F3", "A3", "C4"], ["C3", "E3", "G3"]
        ];
        let currentChordIndex = 0;
        const cyberScale = ["D3", "F3", "G3", "G#3", "A3", "C4", "D4", "F4"];

        // 预设定义
        const stylePresets = [
            { name: "CLASSICAL", desc: "Symphony | 自动和声 | 宏大" },
            { name: "CYBER PUNK", desc: "Techno | 强力底鼓 | 侧链" },
            { name: "WARZONE", desc: "Cinematic | 螺旋桨 | 警报" }
        ];

        // --- 初始化音频系统的核心 ---
        async function initAudio() {
            try {
                // 1. 混音总线设计
                masterLimiter = new Tone.Limiter(-1).toDestination();

                // Reverb: 默认全干 (Wet=0)，Lv4 才开启，模拟"空间感"作为一种特效
                mainReverb = new Tone.Reverb({ decay: 5, wet: 0 }).connect(masterLimiter);

                // 直升机专用效果器 (放在总线前)
                heliTremolo = new Tone.Tremolo(9, 1).start().connect(masterLimiter);
                heliTremolo.wet.value = 0; // 默认关闭

                // 2. 乐器初始化

                // [Kick / Impact]: 直通 Master (不进 Reverb 保持有力)
                // Cyberpunk 需要更猛的底鼓
                kickGain = new Tone.Gain(1.0).connect(masterLimiter);
                kickSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.1, octaves: 8, oscillator: { type: "sine" },
                    envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 }
                }).connect(kickGain);

                // [Lead / Piano]: 进 Reverb (可变湿)
                leadGain = new Tone.Gain(0.8).connect(mainReverb);
                leadSynth = new Tone.PolySynth(Tone.Synth, {
                    maxPolyphony: 6,
                    options: { oscillator: { type: "triangle" }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 } }
                }).connect(leadGain);

                // [Drone / Strings / Bass]: 进 Reverb
                // 移除 Sidechain 以保证"最基础的低音始终占主导"
                droneGain = new Tone.Gain(0.8).connect(mainReverb);
                droneSynth = new Tone.FatOscillator({ type: "sawtooth", spread: 40, count: 3 }).start();
                droneFilter = new Tone.AutoFilter(0.1, 200).connect(droneGain).start();
                droneSynth.connect(droneFilter);

                // [Organ / Brass / Siren]: 进 Reverb
                organGain = new Tone.Gain(0.6).connect(mainReverb);
                organSynth = new Tone.PolySynth(Tone.Synth, {
                    options: { oscillator: { type: "sawtooth" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.5, release: 0.5 } }
                }).connect(organGain);

                // [Noise / Helicopter]: 直通 Master
                noiseGain = new Tone.Gain(0).connect(masterLimiter);
                noiseSynth = new Tone.Noise("pink").start();
                noiseFilter = new Tone.Filter(800, "lowpass").connect(noiseGain);
                noiseSynth.connect(noiseFilter);

                // 专用 LFO
                sirenLFO = new Tone.LFO(0.5, 400, 600).start(); // 0.5Hz 的警报起伏

                // 3. Transport
                Tone.Transport.bpm.value = 120;
                Tone.Transport.scheduleRepeat(globalTick, "16n");

                await Tone.start();
                Tone.Transport.start();

                applyPreset(0);
                updateIntensity(0);

                console.log('✅ 音频引擎 v4.1 (Stable Routing)');
            } catch (e) { console.error("Audio Init Error:", e); }
        }

        // --- 全局节拍事件 ---
        function globalTick(time) {
            const position = Tone.Transport.position.split(':');
            const beat = parseInt(position[1]);
            const sixteenth = parseFloat(position[2]).toFixed(1);
            const isDownbeat = (sixteenth === "0.0");

            // 和弦切换
            const measure = parseInt(position[0]);
            currentChordIndex = Math.floor(measure / 2) % chordProgression.length;
            const chord = chordProgression[currentChordIndex];

            // === 1. CLASSICAL ===
            if (currentFingers === 0) {
                // Piano (Base): 始终稳固
                // 只有 Level 0+ 且有能量时弹，作为基底
                if (currentEnergy > 5 && (isDownbeat || currentEnergy > 50)) {
                    leadSynth.triggerAttackRelease(
                        chord[Math.floor(Math.random() * chord.length)],
                        "16n", time
                    );
                }

                // Strings (Lv2+): 干音叠加
                if (currentIntensity >= 1 && beat === 0 && isDownbeat) {
                    droneSynth.frequency.rampTo(chord[0], 0.1);
                }

                // Brass (Lv3+): 干音点缀
                if (currentIntensity >= 2 && beat === 0 && isDownbeat) {
                    if (currentVelocity > 40) { // 稍微用力才出来
                        organSynth.triggerAttackRelease([chord[0], chord[4] || chord[1]], "4n", time, 0.8);
                    }
                }

                // Tutti (Lv4): 混响开启 (见 updateIntensity)
            }

            // === 2. CYBERPUNK ===
            else if (currentFingers === 1) {
                // Kick (Base): 显著加强
                if (currentEnergy > 5) {
                    if (isDownbeat) {
                        kickSynth.triggerAttackRelease("C1", "8n", time, 1.2); // Velocity 1.2 增强力度
                    } else if (currentEnergy > 80 && Math.random() > 0.6) {
                        kickSynth.triggerAttackRelease("C1", "16n", time, 1.0);
                    }
                }

                // Guitar (Lv2+): 干音，清晰
                if (currentIntensity >= 1 && currentEnergy > 20 && Math.random() > 0.6) {
                    const note = cyberScale[Math.floor(Math.random() * cyberScale.length)];
                    leadSynth.triggerAttackRelease(note, "16n", time, 0.7); // 音量稍收，不抢 Kick
                }

                // Bass (Lv3+): 补充低频
                if (currentIntensity >= 2 && !isDownbeat && sixteenth === "2.0") {
                    droneSynth.frequency.value = "D2";
                }
            }

            // === 3. WARZONE ===
            else if (currentFingers === 2) {
                // Drone (Lv1): 始终由 Base 负责，在 playPerformanceNote 里做动态

                // Siren (Lv3): 警报
                if (currentIntensity >= 2) {
                    // 双音效果由 organSynth 模拟
                    if (isDownbeat && beat % 4 === 0) { // 长警报
                        // 两个音稍微走调，制造紧张感
                        organSynth.triggerAttackRelease(["A4", "A#4"], "1m", time, 0.4);
                    }
                }
            }
        }

        // 应用音色预设
        function applyPreset(presetId) {
            if (!leadSynth) return;
            if (presetId < 0 || presetId >= stylePresets.length) return;

            leadSynth.releaseAll();
            organSynth.releaseAll();
            sirenLFO.stop();

            // 路由还原
            noiseGain.disconnect();
            noiseGain.connect(masterLimiter); // 默认直通
            heliTremolo.wet.value = 0; // 关闭 Tremolo

            if (presetId === 2) {
                sirenLFO.start();
                // Warzone 特殊路由: Noise 通过 Tremolo
                noiseGain.disconnect();
                noiseGain.connect(heliTremolo);
                heliTremolo.wet.value = 1;
            }

            currentFingers = presetId;
            presetDisplay.innerText = stylePresets[presetId].name;

            switch (presetId) {
                case 0: configClassical(); break;
                case 1: configCyberpunk(); break;
                case 2: configWarzone(); break;
            }
            updateIntensity(0);
        }

        // 手势触发事件 (动态控制)
        function playPerformanceNote(velocity, energy) {
            if (Tone.context.state !== 'running') Tone.context.resume();
            currentVelocity = velocity;
            currentEnergy = energy;

            // WARZONE Drone 动态: 近大远小
            if (currentFingers === 2) {
                // 只有 Drone 开启时 (Lv1+)
                // 速度越快(近)，Filter 越开，且音量越大
                const dynamicVol = Tone.gainToDb(0.4 + (velocity / 200) * 0.4); // 0.4 ~ 0.8
                droneGain.gain.rampTo(Tone.dbToGain(dynamicVol), 0.1);

                // 额外的风阻感: 速度越快，频率稍微 Detune
                droneSynth.detune.rampTo(velocity > 50 ? (velocity - 50) : 0, 0.1);
            }

            // WARZONE Explosion (Lv4)
            if (currentFingers === 2 && currentIntensity >= 3) {
                if (velocity > 120 && Tone.now() - lastTriggerTime > 1) {
                    // 炸弹穿插其中，不压低 Drone
                    kickSynth.triggerAttackRelease("G0", "1n", "+0", 1.5); // 极重低音
                    noiseSynth.type = "brown";
                    noiseGain.gain.cancelScheduledValues(Tone.now());
                    noiseGain.gain.setValueAtTime(1, Tone.now());
                    noiseGain.gain.exponentialRampTo(0, 3, Tone.now() + 3); // 长尾音
                    lastTriggerTime = Tone.now();
                }
            }
        }

        function updateIntensity(level) {
            currentIntensity = level;
            const t = 0.5;
            const now = Tone.now();

            // 核心混音逻辑: Lv4 才开 Global Reverb
            mainReverb.wet.rampTo(level >= 3 ? 0.4 : 0, 2); // 慢慢进入混响

            if (currentFingers === 0) { // CLASSICAL
                // Lv1: Piano (Base)
                leadGain.gain.rampTo(1, t);
                // Lv2: Violin (Dry)
                droneGain.gain.rampTo(level >= 1 ? 0.4 : 0, t);
                // Lv3: Brass (Dry)
                organGain.gain.rampTo(level >= 2 ? 0.5 : 0, t);
            }
            else if (currentFingers === 1) { // CYBER PUNK
                // Lv1: Kick (Base)
                kickGain.gain.rampTo(1.2, t);
                // Lv2: Guitar (Dry)
                leadGain.gain.rampTo(level >= 1 ? 0.7 : 0, t);
                // Lv3: Bass (Dry)
                droneGain.gain.rampTo(level >= 2 ? 0.6 : 0, t);
                // Lv4: Noise
                noiseGain.gain.rampTo(level >= 3 ? 0.2 : 0, t);
            }
            else if (currentFingers === 2) { // WARZONE
                // Lv1: Drone (Base) - 始终坚挺
                droneGain.gain.rampTo(0.6, t);
                // Lv2: Helicopter (扇叶感)
                noiseGain.gain.rampTo(level >= 1 ? 0.5 : 0, t);
                // Lv3: Siren (Warning)
                organGain.gain.rampTo(level >= 2 ? 0.4 : 0, t);
                // Lv4: Explosion (Triggered)
            }
        }

        // --- 音色配置 ---
        function configClassical() {
            leadSynth.set({ oscillator: { type: "triangle" } }); // Piano
            droneSynth.type = "sawtooth"; // Strings
            droneSynth.frequency.value = chordProgression[0][0];
            if (droneFilter) droneFilter.type = "lowpass";
            if (droneFilter) droneFilter.frequency.value = 1500; // 稍微亮一点
            organSynth.set({ oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.5 } });
        }

        function configCyberpunk() {
            leadSynth.set({ oscillator: { type: "sawtooth" } }); // 更亮的 Guitar
            droneSynth.type = "square"; // Bass
            if (droneFilter) droneFilter.type = "lowpass";
            if (droneFilter) droneFilter.frequency.value = 400; // 闷一点的 Bass
        }

        function configWarzone() {
            // Drone: 深沉
            droneSynth.type = "sine";
            droneSynth.frequency.value = "D1";

            // Helicopter: Noise + LFO
            noiseSynth.type = "brown";
            if (droneFilter) droneFilter.type = "highpass"; // 对 Noise 无效，但这不重要

            // Siren: 双音
            organSynth.set({ oscillator: { type: "fatcustom", count: 2, spread: 20 }, portamento: 0.1 });
        }

        // 计算平均能量
        function getAvgEnergy() {
            if (!energyBuffer.length) return 0;
            const sum = energyBuffer.reduce((a, b) => a + b, 0);
            const avg = (sum / energyBuffer.length) / 100;
            return isFinite(avg) ? avg : 0;
        }

        // 连接 WebSocket
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8080'); // 确保这里的 IP 和 App.js 一致（或使用 localhost）

            ws.onopen = () => {
                console.log('✅ WebSocket 已连接');
                wsStatus.innerText = '已连接';
                wsDot.classList.add('active');
                ws.send(JSON.stringify({ type: 'register', client: 'browser' }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'motion' && isStarted) {
                        velocityDisplay.innerText = Math.round(data.velocity);
                        energyDisplay.innerText = Math.round(data.energy);
                        // 实时更新层级 (如果 App 发送了 intensity)
                        if (data.intensity !== undefined && data.intensity !== currentIntensity) {
                            updateIntensity(data.intensity);
                            // 更新 UI 显示 (可选)
                        }
                        playPerformanceNote(data.velocity, data.energy);
                    }
                    else if (data.type === 'preset') {
                        applyPreset(data.value);
                    }
                    else if (data.type === 'intensity') {
                        updateIntensity(data.value);
                    }
                } catch (e) { console.error('消息解析失败:', e); }
            };
            ws.onerror = (error) => {
                console.error('❌ WebSocket 错误:', error);
                wsStatus.innerText = '连接失败';
                wsDot.classList.remove('active');
            };

            ws.onclose = () => {
                console.log('⚠️ WebSocket 已断开');
                wsStatus.innerText = '已断开';
                wsDot.classList.remove('active');
            };
        }

        // 启动按钮
        startBtn.onclick = async () => {
            try {
                await Tone.start();
                initAudio();
                Tone.Transport.start();
                isStarted = true;
                startBtn.innerText = '✅ 系统已启动';
                startBtn.disabled = true;
                startBtn.style.opacity = '0.5';

                // 连接 WebSocket
                connectWebSocket();
            } catch (e) {
                console.error(e);
                startBtn.innerText = "重试...";
            }
        };

        console.log('📌 使用说明:');
        console.log('1. 点击"启动音频系统"按钮');
        console.log('2. 在手机 Expo App 中连接到服务器');
        console.log('3. 挥动手机，享受音乐！');
    </script>
</body>

</html>
