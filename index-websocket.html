<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 音频引擎 - 体感DJ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 18px;
            letter-spacing: 4px;
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            transition: all 0.4s;
        }

        #start-btn:hover {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
        }

        #status {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        #info {
            margin-top: 20px;
            text-align: center;
            line-height: 1.8;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f00;
            margin-right: 8px;
        }

        .dot.active {
            background: #0f0;
        }
    </style>
</head>

<body>

    <button id="start-btn">启动音频系统</button>
    <div id="status">
        <span class="dot" id="ws-dot"></span> WebSocket: <span id="ws-status">未连接</span>
    </div>
    <div id="info">
        <div>速度: <span id="velocity">0</span> cm/s</div>
        <div>能量: <span id="energy">0</span>%</div>
        <div>音色: <span id="preset">1</span></div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const wsStatus = document.getElementById('ws-status');
        const wsDot = document.getElementById('ws-dot');
        const velocityDisplay = document.getElementById('velocity');
        const energyDisplay = document.getElementById('energy');
        const presetDisplay = document.getElementById('preset');

        let ws = null;
        let isStarted = false;
        let currentFingers = 0;

        // 音频引擎变量
        let leadSynth, kickSynth, droneSynth, organSynth, noiseSynth;
        let mainFilter, mainReverb, delay, masterGain;
        // 各个合成器的 Gain Node
        let leadGain, kickGain, droneGain, organGain, noiseGain;

        let energyBuffer = [];
        let lastTriggerTime = 0;
        let lastKickTime = 0;
        let currentIntensity = 0; // 0, 1, 2, 3
        let currentArpeggiator = null;
        let helicopterLFO = null; // 直升机震荡器

        // D小调五声音阶
        const scaleNotes = ["D2", "A2", "D3", "E3", "F3", "A3", "C4", "D4", "E4", "F4", "A4"];
        // 电吉他高音阶
        const guitarScale = ["D3", "F3", "G3", "A3", "C4", "D4", "F4", "G4", "A4", "C5", "D5"];

        // 音色预设定义 (3个)
        const stylePresets = [
            { name: "CLASSICAL", desc: "Piano > Violin > Trumpet > Full" },
            { name: "CYBER PUNK", desc: "Kick > Guitar > Bass > Noise" },
            { name: "WARZONE", desc: "Drone > Helicopter > Siren > Boom" }
        ];

        // 初始化音频引擎
        function initAudio() {
            try {
                masterGain = new Tone.Gain(-3, "db").toDestination();

                // 效果器
                mainFilter = new Tone.Filter(3500, "lowpass").connect(masterGain);
                delay = new Tone.FeedbackDelay("8n", 0.2).connect(mainFilter); // 减少 Delay
                mainReverb = new Tone.Reverb({ decay: 3, wet: 0.2 }).connect(masterGain); // 减少 Reverb

                // --- 1. Lead (Piano / Guitar) ---
                leadGain = new Tone.Gain(0).connect(mainReverb);
                leadSynth = new Tone.PolySynth(Tone.FMSynth, {
                    maxPolyphony: 6,
                    options: { oscillator: { type: "sine" } }
                }).connect(leadGain);

                // --- 2. Drone (Strings / Bass / Helicopter) ---
                droneGain = new Tone.Gain(0).connect(mainReverb);
                droneSynth = new Tone.FatOscillator({
                    type: "sawtooth", spread: 20, count: 3
                }).start();
                const droneFilter = new Tone.AutoFilter(0.1, 200).connect(droneGain).start();
                droneSynth.connect(droneFilter);

                // 直升机专用 LFO
                helicopterLFO = new Tone.LFO(8, 0, 1).start(); // 8Hz 突突突

                // --- 3. Kick (Kick / Trumpet / Siren) ---
                kickGain = new Tone.Gain(0).connect(masterGain);
                kickSynth = new Tone.MembraneSynth().connect(kickGain);
                // 也可以用来做简单的 FM Synth (Siren)

                // --- 4. Organ / Pad / Explosion ---
                organGain = new Tone.Gain(0).connect(mainReverb);
                organSynth = new Tone.PolySynth(Tone.Synth, {
                    maxPolyphony: 4,
                    options: { oscillator: { type: "fatcustom", count: 3, spread: 30 } }
                }).connect(organGain);

                // --- 5. Noise (Glitch / Engine) ---
                noiseGain = new Tone.Gain(0).connect(mainFilter);
                noiseSynth = new Tone.Noise("pink").start();
                // 爆炸专用 Filter
                const noiseFilter = new Tone.Filter(500, "lowpass").connect(noiseGain);
                noiseSynth.connect(noiseFilter);

                Tone.Transport.bpm.value = 120;
                applyPreset(0);
                updateIntensity(0);

                console.log('✅ 音频引擎初始化成功 (v3.0)');
            } catch (e) {
                console.error("Audio Init Error:", e);
            }
        }

        // 应用音色预设
        function applyPreset(presetId) {
            if (!leadSynth) return;
            if (presetId < 0 || presetId >= stylePresets.length) return;

            leadSynth.releaseAll();
            organSynth.releaseAll();

            currentFingers = presetId;
            presetDisplay.innerText = stylePresets[presetId].name;

            // 停止之前的 Loop
            if (currentArpeggiator) { currentArpeggiator.stop(); currentArpeggiator.dispose(); currentArpeggiator = null; }

            // 重置 LFO 连接
            helicopterLFO.disconnect();

            switch (presetId) {
                case 0: // CLASSICAL
                    configClassical();
                    startClassicalArp();
                    break;
                case 1: // CYBER PUNK
                    configCyberpunk();
                    break;
                case 2: // WARZONE
                    configWarzone();
                    break;
            }
            // 切换音色时重置层级
            updateIntensity(0);
        }

        // 更新层级 (0-3)
        function updateIntensity(level) {
            currentIntensity = level;
            const rampTime = 0.5;

            if (currentFingers === 0) { // CLASSICAL: Piano > Strings > Trumpet > Organ
                // Lv1: Piano (始终有)
                leadGain.gain.rampTo(1, rampTime);

                // Lv2: + Violin (Bright Sawtooth)
                droneGain.gain.rampTo(level >= 1 ? 0.2 : 0, rampTime);

                // Lv3: + Trumpet (KickSynth模拟不出来，用 LeadSynth 的高音部或 OrganSynth 模拟)
                // 这里我们开启 OrganSynth 的某个通道作为 Trumpet
                // 简单点，用 OrganSynth 模拟 Brass 
                organGain.gain.rampTo(level >= 2 ? 0.4 : 0, rampTime);

                // Lv4: + Full Organ / Bass (Kick)
                kickGain.gain.rampTo(level >= 3 ? 0.5 : 0, rampTime);
            }
            else if (currentFingers === 1) { // CYBER PUNK: Kick > Guitar > Bass > Noise
                // Lv1: Kick (始终有)
                kickGain.gain.rampTo(0.8, rampTime);

                // Lv2: + Guitar (Lead)
                leadGain.gain.rampTo(level >= 1 ? 0.7 : 0, rampTime);

                // Lv3: + Bass (Drone)
                droneGain.gain.rampTo(level >= 2 ? 0.6 : 0, rampTime);

                // Lv4: + Noise
                noiseGain.gain.rampTo(level >= 3 ? 0.2 : 0, rampTime);
            }
            else if (currentFingers === 2) { // WARZONE: Drone > Heli > Siren > Boom
                // Lv1: Drone (Deep)
                droneGain.gain.rampTo(0.5, rampTime);

                // Lv2: + Helicopter (Noise modulated)
                noiseGain.gain.rampTo(level >= 1 ? 0.4 : 0, rampTime);

                // Lv3: + Siren (Lead FM)
                leadGain.gain.rampTo(level >= 2 ? 0.4 : 0, rampTime);

                // Lv4: + Explosion (Kick Impact)
                kickGain.gain.rampTo(level >= 3 ? 1 : 0, rampTime);
            }
        }

        // 配置: Classical
        function configClassical() {
            // Piano
            leadSynth.set({
                oscillator: { type: "triangle" },
                envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.8 }
            });
            // Violin (Bright)
            droneSynth.type = "sawtooth";
            droneSynth.frequency.value = "A4"; // 高音弦乐
            // Trumpet/Brass (using OrganSynth)
            organSynth.set({
                oscillator: { type: "sawtooth" }, // 铜管用锯齿波
                envelope: { attack: 0.05, decay: 0.2, sustain: 0.5, release: 0.5 }
            });
            // Full Organ/Bass (using KickSynth for deep bass)
            kickSynth.set({ pitchDecay: 0.05, octaves: 4 });
        }

        // 配置: Cyberpunk
        function configCyberpunk() {
            // Guitar (Lead) - 此处模拟电吉他
            leadSynth.set({
                oscillator: { type: "sawtooth" }, // 锯齿波更像失真吉他
                envelope: { attack: 0.01, decay: 0.2, sustain: 0.8, release: 0.5 },
                modulationIndex: 10
            });
            // Bass
            droneSynth.type = "square"; // 方波 Bass
            droneSynth.frequency.value = "D1"; // 低频
            // Kick
            kickSynth.set({ pitchDecay: 0.05, octaves: 8 });
            // Noise
            noiseSynth.type = "pink";
        }

        // 配置: Warzone
        function configWarzone() {
            // Drone
            droneSynth.type = "sine";
            droneSynth.frequency.value = "D1"; // 极低频
            // Helicopter (Noise)
            noiseSynth.type = "brown";
            // LFO 调制 Noise Gain 来模拟螺旋桨
            helicopterLFO.connect(noiseGain.gain);

            // Siren (Lead)
            leadSynth.set({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 1, decay: 0, sustain: 1, release: 2 }, // 慢起慢落
                portamento: 0.2 // 滑音
            });
            // Explosion (Kick)
            kickSynth.set({
                pitchDecay: 0.1,
                octaves: 6,
                envelope: { attack: 0.001, decay: 1, sustain: 0, release: 2 }
            });
        }

        // Classical Arp (保持不变，很完美)
        function startClassicalArp() {
            currentArpeggiator = new Tone.Loop((time) => {
                const energy = getAvgEnergy();
                if (energy > 0.05) {
                    const idx = Math.floor(energy * (scaleNotes.length - 1));
                    leadSynth.triggerAttackRelease(scaleNotes[idx], "16n", time);
                    if (energy > 0.6) {
                        const nextIdx = (idx + 3) % scaleNotes.length;
                        leadSynth.triggerAttackRelease(scaleNotes[nextIdx], "16n", time + Tone.Time("32n"));
                    }
                }
            }, "8n").start(0);
        }

        // 主演逻辑
        function playPerformanceNote(velocity, energy) {
            const now = performance.now();
            if (Tone.context.state !== 'running') Tone.context.resume();

            if (currentFingers === 0) { // CLASSICAL
                // Piano: Arp 自动演奏
                // Violin: 随手势强弱变化音量/滤波
                if (currentIntensity >= 1) {
                    // 简单模拟: 速度越快，提琴越响/亮
                    droneGain.gain.rampTo(Math.min(velocity / 200, 0.4), 0.1);
                }
                // Trumpet: 大幅度动作触发 (Lv2+)
                if (currentIntensity >= 2 && velocity > 80 && now - lastTriggerTime > 300) {
                    const note = scaleNotes[Math.floor(Math.random() * 4) + 4]; // 中高音区
                    organSynth.triggerAttackRelease([note], "4n"); // 短促有力的铜管
                    lastTriggerTime = now;
                }
                // Full Organ: 极强动作触发 (Lv3+)
                if (currentIntensity >= 3 && energy > 0.8 && now - lastTriggerTime > 1000) {
                    kickSynth.triggerAttackRelease("C1", "1n"); // 深沉低音
                }
            }
            else if (currentFingers === 1) { // CYBER PUNK
                // Kick: 速率随速度变化 (Lv0+)
                let kickInterval = 500; // 默认慢
                if (energy > 0.6) kickInterval = 250; // 快
                if (energy > 0.8) kickInterval = 125; // 极快

                if (now - lastKickTime > kickInterval) {
                    kickSynth.triggerAttackRelease("C1", "8n");
                    lastKickTime = now;
                }

                // Guitar: 动态演奏 (Lv1+)
                if (currentIntensity >= 1) {
                    if (velocity < 40) {
                        // 慢速: 长音/和弦
                        if (now - lastTriggerTime > 800) {
                            leadSynth.triggerAttackRelease(["D3", "F3", "A3"], "2n");
                            lastTriggerTime = now;
                        }
                    } else {
                        // 快速: 轮指 (Shredding)
                        if (now - lastTriggerTime > (200 - velocity)) { // 速度越快间隔越短
                            const idx = Math.floor(Math.random() * guitarScale.length);
                            leadSynth.triggerAttackRelease(guitarScale[idx], "16n");
                            lastTriggerTime = now;
                        }
                    }
                }

                // Bass (Drone) (Lv2+)

                // Noise (Lv3+)
                if (currentIntensity >= 3 && velocity > 100) {
                    noiseGain.gain.rampTo(0.3, 0.1);
                    noiseGain.gain.rampTo(0, 0.5); // 短促噪音
                }
            }
            else if (currentFingers === 2) { // WARZONE
                // Drone (Lv0)

                // Helicopter (Lv1) - 已经被 LFO 自动控制，这里可以控制 LFO 速率
                if (currentIntensity >= 1) {
                    // 速度越快，螺旋桨越快
                    helicopterLFO.frequency.rampTo(5 + energy * 10, 0.5);
                }

                // Siren (Lv2)
                if (currentIntensity >= 2) {
                    // 手高低控制警报音高
                    const pitch = 300 + energy * 500;
                    leadSynth.triggerAttackRelease(pitch, "8n"); // 这里 PolySynth 也能接受频率
                }

                // Explosion (Lv3) 猛烈触发
                if (currentIntensity >= 3 && velocity > 120 && now - lastTriggerTime > 1000) {
                    kickSynth.triggerAttackRelease("C0", "2n"); // 巨型爆炸
                    // 配合 Noise 冲击
                    noiseSynth.type = "brown";
                    noiseGain.gain.value = 1;
                    noiseGain.gain.exponentialRampTo(0, 2);
                    lastTriggerTime = now;
                }
            }

            energyBuffer.push(energy);
            if (energyBuffer.length > 30) energyBuffer.shift();
        }

        // 计算平均能量
        function getAvgEnergy() {
            if (!energyBuffer.length) return 0;
            const sum = energyBuffer.reduce((a, b) => a + b, 0);
            const avg = (sum / energyBuffer.length) / 100;
            return isFinite(avg) ? avg : 0;
        }

        // 连接 WebSocket
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8080'); // 确保这里的 IP 和 App.js 一致（或使用 localhost）

            ws.onopen = () => {
                console.log('✅ WebSocket 已连接');
                wsStatus.innerText = '已连接';
                wsDot.classList.add('active');
                ws.send(JSON.stringify({ type: 'register', client: 'browser' }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'motion' && isStarted) {
                        velocityDisplay.innerText = Math.round(data.velocity);
                        energyDisplay.innerText = Math.round(data.energy);
                        // 实时更新层级 (如果 App 发送了 intensity)
                        if (data.intensity !== undefined && data.intensity !== currentIntensity) {
                            updateIntensity(data.intensity);
                            // 更新 UI 显示 (可选)
                        }
                        playPerformanceNote(data.velocity, data.energy);
                    }
                    else if (data.type === 'preset') {
                        applyPreset(data.value);
                    }
                    else if (data.type === 'intensity') {
                        updateIntensity(data.value);
                    }
                } catch (e) { console.error('消息解析失败:', e); }
            };
            ws.onerror = (error) => {
                console.error('❌ WebSocket 错误:', error);
                wsStatus.innerText = '连接失败';
                wsDot.classList.remove('active');
            };

            ws.onclose = () => {
                console.log('⚠️ WebSocket 已断开');
                wsStatus.innerText = '已断开';
                wsDot.classList.remove('active');
            };
        }

        // 启动按钮
        startBtn.onclick = async () => {
            try {
                await Tone.start();
                initAudio();
                Tone.Transport.start();
                isStarted = true;
                startBtn.innerText = '✅ 系统已启动';
                startBtn.disabled = true;
                startBtn.style.opacity = '0.5';

                // 连接 WebSocket
                connectWebSocket();
            } catch (e) {
                console.error(e);
                startBtn.innerText = "重试...";
            }
        };

        console.log('📌 使用说明:');
        console.log('1. 点击"启动音频系统"按钮');
        console.log('2. 在手机 Expo App 中连接到服务器');
        console.log('3. 挥动手机，享受音乐！');
    </script>
</body>

</html>
