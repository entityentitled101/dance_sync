<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body>
    <script>
        let leadSynth, kickSynth, mainFilter, mainReverb, delay, masterGain, kickGain;
        let energyBuffer = [];
        let lastTriggerTime = 0;
        let isReady = false;
        let currentPreset = 1;

        // D小调五声音阶
        const scaleNotes = ["D2", "A2", "D3", "E3", "F3", "A3", "C4", "D4", "E4", "F4", "A4"];

        // 初始化音频引擎
        async function initAudio() {
            try {
                sendLog('开始初始化音频引擎...');

                // 检查 Tone.js 是否加载
                if (typeof Tone === 'undefined') {
                    sendError('Tone.js 未加载！CDN 可能被阻止了');
                    return;
                }
                sendLog('Tone.js 已加载');

                await Tone.start();
                sendLog('Tone.context 已启动');

                masterGain = new Tone.Gain(-6, "db").toDestination();
                kickGain = new Tone.Gain(4, "db").connect(masterGain);

                mainFilter = new Tone.Filter(1500, "lowpass").connect(masterGain);
                delay = new Tone.FeedbackDelay("8n", 0.45).connect(mainFilter);
                mainReverb = new Tone.Reverb({ decay: 4, wet: 0.5 }).connect(delay);
                sendLog('音频节点创建成功');

                // 限制最大发声数为 8
                leadSynth = new Tone.PolySynth(Tone.FMSynth, {
                    maxPolyphony: 8,
                    options: {
                        envelope: { attack: 0.1, release: 0.8 },
                        modulationEnvelope: { attack: 0.2, release: 0.8 }
                    }
                }).connect(mainReverb);
                sendLog('合成器创建成功');

                kickSynth = new Tone.MembraneSynth().connect(kickGain);

                // 智能底鼓循环
                new Tone.Loop((time) => {
                    const energy = getAvgEnergy();
                    if (energy > 0.12) {
                        kickSynth.triggerAttackRelease("C1", "8n", time, 0.4 + energy * 0.6);
                    }
                }, "4n").start(0);

                Tone.Transport.bpm.value = 115;
                Tone.Transport.start();
                sendLog('传输引擎已启动');

                applyPreset(1); // 默认预设

                isReady = true;

                // 通知 React Native 已就绪
                window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'ready' }));

                sendLog('✅ 音频引擎完全就绪！');
            } catch (e) {
                sendError('初始化失败: ' + e.message);
                console.error("Audio Init Error:", e);
            }
        }

        // 发送日志到 React Native
        function sendLog(message) {
            console.log(message);
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    type: 'log',
                    message: message
                }));
            }
        }

        // 发送错误到 React Native
        function sendError(message) {
            console.error(message);
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    type: 'error',
                    message: message
                }));
            }
        }

        // 应用音色预设
        function applyPreset(presetId) {
            if (!leadSynth) return;

            leadSynth.releaseAll(); // 清空残留语音
            currentPreset = presetId;

            switch (presetId) {
                case 0: // Fist - Atmospheric
                    leadSynth.set({
                        oscillator: { type: "sine" },
                        envelope: { attack: 0.4, release: 2 },
                        harmonicity: 1, modulationIndex: 5
                    });
                    break;
                case 1: // Index - Pulse
                    leadSynth.set({
                        oscillator: { type: "square" },
                        envelope: { attack: 0.01, release: 0.5 },
                        harmonicity: 2, modulationIndex: 10
                    });
                    break;
                case 2: // Middle - Thick Saw
                    leadSynth.set({
                        oscillator: { type: "sawtooth" },
                        envelope: { attack: 0.1, release: 1 },
                        harmonicity: 0.5, modulationIndex: 15
                    });
                    break;
                case 3: // Ring - Ethereal
                    leadSynth.set({
                        oscillator: { type: "triangle" },
                        envelope: { attack: 0.2, release: 3 },
                        harmonicity: 1.5, modulationIndex: 20
                    });
                    break;
            }
        }

        // 播放音符
        function playNote(velocity, energy) {
            const now = performance.now();

            // 节流保护：60ms 才能触发一次
            if (now - lastTriggerTime < 60) return;

            if (Tone.context.state !== 'running') {
                Tone.context.resume();
            }

            // 速度映射到音高（0-100 映射到音阶）
            const normalizedVel = Math.min(velocity / 200, 1);
            const index = Math.floor(normalizedVel * (scaleNotes.length - 1));
            const note = scaleNotes[index];

            // 触发音符
            if (velocity > 20) {
                const duration = velocity > 100 ? "32n" : "8n";
                leadSynth.triggerAttackRelease(note, duration);
                lastTriggerTime = now;
            }

            // 滤波器调制（速度越快越明亮）
            const filterCutoff = Math.min(velocity * 50 + 300, 16000);
            if (isFinite(filterCutoff)) {
                mainFilter.frequency.rampTo(filterCutoff, 0.1);
            }

            // 更新能量缓冲
            energyBuffer.push(energy);
            if (energyBuffer.length > 30) {
                energyBuffer.shift();
            }
        }

        // 计算平均能量
        function getAvgEnergy() {
            if (!energyBuffer.length) return 0;
            const sum = energyBuffer.reduce((a, b) => a + b, 0);
            const avg = (sum / energyBuffer.length) / 100;
            return isFinite(avg) ? avg : 0;
        }

        // 接收来自 React Native 的消息
        document.addEventListener('message', (event) => {
            handleMessage(event.data);
        });

        window.addEventListener('message', (event) => {
            handleMessage(event.data);
        });

        function handleMessage(data) {
            try {
                const message = JSON.parse(data);

                if (message.type === 'init') {
                    // 手动初始化音频（用户交互触发）
                    if (!isReady) {
                        initAudio();
                    }
                } else if (message.type === 'test') {
                    // 测试音符
                    sendLog('播放测试音符: ' + message.note);
                    if (leadSynth && isReady) {
                        try {
                            if (Tone.context.state !== 'running') {
                                Tone.context.resume();
                            }
                            leadSynth.triggerAttackRelease(message.note || 'C4', '4n');
                            sendLog('✅ 测试音符已播放');
                        } catch (e) {
                            sendError('播放失败: ' + e.message);
                        }
                    } else {
                        sendError('合成器未就绪');
                    }
                } else if (message.type === 'motion') {
                    playNote(message.velocity, message.energy);
                } else if (message.type === 'preset') {
                    applyPreset(message.value);
                } else if (message.type === 'volume') {
                    if (masterGain) {
                        masterGain.volume.rampTo(message.value, 0.1);
                    }
                }
            } catch (e) {
                console.error('消息解析错误:', e);
            }
        }

        // 不再自动初始化，等待用户点击
        // setTimeout(() => {
        //     initAudio();
        // }, 500);
    </script>
</body>

</html>
